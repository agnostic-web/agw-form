<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@neutro/form — Playground</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="form-core.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg0:#0d1117; --bg1:#161b22; --bg2:#21262d; --bg3:#2d333b;
      --border:#30363d; --focus:#58a6ff;
      --t0:#e6edf3; --t1:#b1bac4; --t2:#8b949e;
      --blue:#58a6ff; --green:#3fb950; --red:#f85149; --yellow:#d29922; --purple:#a371f7;
      --hdr:52px; --tabs:42px; --foot:52px; --side:214px; --perf:218px;
    }
    html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--t0);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
      font-size:14px;line-height:1.5;}

    /* ── header */
    .hdr{height:var(--hdr);background:var(--bg1);border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 20px;gap:12px;}
    .hdr-logo{font-size:15px;font-weight:700;color:var(--blue);font-family:'SF Mono',Menlo,monospace;}
    .hdr-tag{font-size:12px;color:var(--t2);border-left:1px solid var(--border);padding-left:12px;}
    .hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
    .chip{background:var(--bg2);border:1px solid var(--border);color:var(--t1);
      font-size:11px;padding:3px 10px;border-radius:20px;font-family:'SF Mono',Menlo,monospace;
      text-decoration:none;transition:all .15s;}
    .chip:hover{border-color:var(--blue);color:var(--blue);}

    /* ── framework tabs */
    .fw-tabs{height:var(--tabs);background:var(--bg1);border-bottom:1px solid var(--border);
      display:flex;align-items:stretch;padding:0 12px;gap:2px;overflow-x:auto;}
    .fw-tabs::-webkit-scrollbar{display:none;}
    .fw-tab{padding:0 16px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;
      border:none;background:transparent;border-bottom:2px solid transparent;
      display:flex;align-items:center;gap:6px;white-space:nowrap;transition:color .15s;}
    .fw-tab:hover{color:var(--t0);}
    .fw-tab.active{color:var(--t0);border-bottom-color:var(--blue);}

    /* ── workspace grid */
    .workspace{display:grid;
      grid-template-columns:var(--side) 1fr 1fr var(--perf);
      height:calc(100vh - var(--hdr) - var(--tabs) - var(--foot));overflow:hidden;}
    .workspace.hide-perf{grid-template-columns:var(--side) 1fr 1fr;}

    /* ── sidebar */
    .sidebar{background:var(--bg1);border-right:1px solid var(--border);
      overflow-y:auto;padding:6px 0;}
    .sidebar::-webkit-scrollbar{width:4px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .sidebar-label{font-size:10px;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;color:var(--t2);padding:8px 14px 4px;}
    .step-item{display:flex;align-items:center;gap:8px;padding:5px 14px;
      cursor:pointer;font-size:12px;color:var(--t1);
      border-left:2px solid transparent;transition:all .1s;}
    .step-item:hover{background:var(--bg2);color:var(--t0);}
    .step-item.active{background:var(--bg2);color:var(--blue);border-left-color:var(--blue);}
    .step-num{min-width:18px;height:18px;background:var(--bg2);border:1px solid var(--border);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:9px;font-family:'SF Mono',Menlo,monospace;font-weight:700;color:var(--t2);}
    .step-item.active .step-num{background:var(--blue);border-color:var(--blue);color:#fff;}

    /* ── code panel */
    .code-panel{background:var(--bg1);border-right:1px solid var(--border);
      display:flex;flex-direction:column;overflow:hidden;}
    .panel-hdr{padding:7px 14px;border-bottom:1px solid var(--border);
      font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      color:var(--t2);display:flex;align-items:center;gap:8px;background:var(--bg0);flex-shrink:0;}
    .panel-badge{background:var(--bg2);border:1px solid var(--border);
      padding:1px 7px;border-radius:10px;font-size:10px;}
    .step-hdr{padding:11px 16px 0;flex-shrink:0;}
    .step-hdr h2{font-size:14px;font-weight:600;color:var(--t0);}
    .step-hdr p{font-size:12px;color:var(--t2);margin-top:3px;padding-bottom:10px;
      border-bottom:1px solid var(--border);line-height:1.6;}
    .code-scroll{flex:1;overflow:auto;}
    .code-scroll::-webkit-scrollbar{width:6px;height:6px;}
    .code-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    .code-scroll pre{margin:0;padding:14px 16px;font-size:12.5px;line-height:1.72;min-height:100%;}
    .code-scroll pre code{background:transparent!important;padding:0!important;}

    /* ── demo panel */
    .demo-panel{background:var(--bg0);display:flex;flex-direction:column;overflow:hidden;}
    .demo-area{flex:1;overflow-y:auto;padding:16px;}
    .demo-area::-webkit-scrollbar{width:4px;}
    .demo-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .demo-iframe{width:100%;height:100%;border:none;}

    /* ── perf panel */
    .perf-panel{background:var(--bg1);border-left:1px solid var(--border);
      overflow-y:auto;display:flex;flex-direction:column;}
    .perf-panel::-webkit-scrollbar{width:4px;}
    .perf-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .perf-row{padding:10px 12px;border-bottom:1px solid var(--border);}
    .perf-lbl{font-size:10px;font-weight:700;letter-spacing:.05em;
      text-transform:uppercase;color:var(--t2);margin-bottom:2px;}
    .perf-val{font-size:22px;font-weight:700;font-family:'SF Mono',Menlo,monospace;color:var(--blue);}
    .perf-val.sm{font-size:12px;word-break:break-all;}
    .perf-sub{font-size:10px;color:var(--t2);margin-top:1px;}
    .perf-path-item{display:flex;justify-content:space-between;
      font-size:10px;font-family:'SF Mono',Menlo,monospace;color:var(--t1);padding:2px 0;}
    .perf-path-item em{color:var(--blue);font-style:normal;}

    /* ── footer nav */
    .foot{height:var(--foot);background:var(--bg1);border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;gap:16px;padding:0 20px;}
    .nav-btn{padding:7px 20px;border-radius:6px;border:1px solid var(--border);
      background:var(--bg2);color:var(--t0);font-size:13px;cursor:pointer;transition:all .15s;}
    .nav-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue);}
    .nav-btn:disabled{opacity:.35;cursor:not-allowed;}
    .step-ctr{font-size:12px;color:var(--t2);min-width:88px;text-align:center;
      font-family:'SF Mono',Menlo,monospace;}

    /* ── demo-area components */
    .df{max-width:360px;}
    .fld{margin-bottom:13px;}
    .fld label{display:block;font-size:10px;font-weight:700;letter-spacing:.05em;
      text-transform:uppercase;color:var(--t2);margin-bottom:3px;}
    .fld input,.fld select,.fld textarea{width:100%;background:var(--bg2);
      border:1px solid var(--border);color:var(--t0);border-radius:6px;
      padding:7px 10px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit;}
    .fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--focus);}
    .ferr{color:var(--red);font-size:11px;margin-top:3px;min-height:15px;}
    .fok{color:var(--green);font-size:11px;margin-top:3px;}
    .fhint{color:var(--t2);font-size:11px;margin-top:3px;}

    .btn{padding:7px 16px;border-radius:6px;border:1px solid var(--border);
      background:var(--bg2);color:var(--t0);font-size:13px;cursor:pointer;transition:all .15s;}
    .btn:hover:not(:disabled){background:var(--bg3);border-color:var(--t2);}
    .btn.primary{background:#1f6feb;border-color:#1f6feb;color:#fff;}
    .btn.primary:hover:not(:disabled){background:var(--blue);border-color:var(--blue);}
    .btn.danger{border-color:var(--red);color:var(--red);}
    .btn.danger:hover:not(:disabled){background:rgba(248,81,73,.1);}
    .btn.sm{padding:4px 10px;font-size:12px;}
    .btn:disabled{opacity:.4;cursor:not-allowed;}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}

    .box{background:var(--bg1);border:1px solid var(--border);border-radius:8px;
      padding:11px 14px;font-size:11.5px;font-family:'SF Mono',Menlo,monospace;
      white-space:pre;overflow:auto;max-height:200px;line-height:1.6;}
    .box::-webkit-scrollbar{width:4px;height:4px;}
    .box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    .sec{font-size:10px;font-weight:700;letter-spacing:.06em;
      text-transform:uppercase;color:var(--t2);margin-bottom:7px;}
    .hr{border:none;border-top:1px solid var(--border);margin:12px 0;}

    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
    .badge.g{background:rgba(63,185,80,.15);color:var(--green);}
    .badge.r{background:rgba(248,81,73,.15);color:var(--red);}
    .badge.b{background:rgba(88,166,255,.15);color:var(--blue);}
    .badge.y{background:rgba(210,153,34,.15);color:var(--yellow);}

    .alert{padding:9px 13px;border-radius:6px;font-size:13px;margin-top:10px;line-height:1.5;}
    .alert.ok{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green);}
    .alert.err{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);}
    .alert.info{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);color:var(--blue);}

    .spin{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--blue);
      border-radius:50%;display:inline-block;animation:sp .6s linear infinite;vertical-align:middle;}
    @keyframes sp{to{transform:rotate(360deg);}}

    .arr-item{display:flex;align-items:center;gap:6px;background:var(--bg1);
      border:1px solid var(--border);border-radius:6px;padding:7px 10px;margin-bottom:6px;}
    .arr-item input{flex:1;background:var(--bg2);border:1px solid var(--border);
      color:var(--t0);border-radius:4px;padding:4px 8px;font-size:12px;outline:none;}
    .arr-item input:focus{border-color:var(--focus);}

    .wiz-steps{display:flex;margin-bottom:18px;}
    .wiz-step{flex:1;text-align:center;padding:7px 4px;font-size:11px;font-weight:600;
      color:var(--t2);border-bottom:2px solid var(--border);}
    .wiz-step.active{color:var(--blue);border-bottom-color:var(--blue);}
    .wiz-step.done{color:var(--green);border-bottom-color:var(--green);}

    .sb-link{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;
      background:var(--bg2);border:1px solid var(--border);border-radius:6px;
      color:var(--t0);text-decoration:none;font-size:13px;margin-top:12px;transition:all .15s;}
    .sb-link:hover{border-color:var(--blue);color:var(--blue);}
  </style>
</head>
<body>

<header class="hdr">
  <span class="hdr-logo">@neutro/form</span>
  <span class="hdr-tag">Playground &amp; Tutorial</span>
  <div class="hdr-right">
    <a class="chip" href="https://www.npmjs.com/package/@neutro/form" target="_blank">npm</a>
    <a class="chip" href="https://github.com/neutro-web/form" target="_blank">GitHub</a>
  </div>
</header>

<nav class="fw-tabs" id="fwTabs"></nav>

<div class="workspace" id="workspace">
  <aside class="sidebar" id="sidebar"></aside>
  <section class="code-panel">
    <div class="panel-hdr">
      <span>Code</span>
      <span class="panel-badge" id="codeLang">javascript</span>
    </div>
    <div class="step-hdr" id="stepHdr">
      <h2 id="stepTitle"></h2>
      <p id="stepDesc"></p>
    </div>
    <div class="code-scroll">
      <pre><code id="codeEl" class="language-javascript"></code></pre>
    </div>
  </section>
  <section class="demo-panel">
    <div class="panel-hdr"><span id="demoLabel">Demo</span></div>
    <div class="demo-area" id="demoArea"></div>
  </section>
  <aside class="perf-panel" id="perfPanel">
    <div class="panel-hdr">Engine Internals</div>
    <div id="perfContent"></div>
  </aside>
</div>

<footer class="foot">
  <button class="nav-btn" id="prevBtn">← Prev</button>
  <span class="step-ctr" id="stepCtr"></span>
  <button class="nav-btn" id="nextBtn">Next →</button>
</footer>

<script>
// agwForm global is loaded from form-core.js above
// `let` so renderDemo can temporarily wrap it with withPerf during step.run()
let createForm = agwForm.createForm;

// Dynamic base URL — works on localhost AND GitHub Pages
const BASE_URL = window.location.origin + (window.location.pathname.includes('/form') ? '/form/' : '/');
const CORE_URL = BASE_URL + 'form-core.js';

// ─── IFRAME STYLE SHEET (injected into framework iframes) ────────────────────
const IFRAME_CSS = `
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px;font-size:13px;line-height:1.5;}
input,select,textarea{width:100%;background:#21262d;border:1px solid #30363d;color:#e6edf3;border-radius:6px;padding:6px 10px;font-size:13px;outline:none;transition:border-color .15s;font-family:inherit;}
input:focus,select:focus{border-color:#58a6ff;}
button{padding:6px 14px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#e6edf3;font-size:12px;cursor:pointer;transition:all .15s;}
button:hover:not(:disabled){border-color:#58a6ff;color:#58a6ff;}
button.primary{background:#1f6feb;border-color:#1f6feb;color:#fff;}
button.primary:hover:not(:disabled){background:#388bfd;}
button.danger{border-color:#f85149;color:#f85149;}
.field{margin-bottom:12px;}
label{display:block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#8b949e;margin-bottom:3px;}
.err{color:#f85149;font-size:11px;margin-top:3px;min-height:15px;}
.ok{color:#3fb950;font-size:11px;margin-top:3px;}
.hint{color:#8b949e;font-size:11px;margin-top:3px;}
.box{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px;font-size:11px;font-family:'SF Mono',Menlo,monospace;white-space:pre;overflow:auto;max-height:180px;line-height:1.6;margin-top:8px;}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.g{background:rgba(63,185,80,.15);color:#3fb950;}
.r{background:rgba(248,81,73,.15);color:#f85149;}
.b{background:rgba(88,166,255,.15);color:#58a6ff;}
hr{border:none;border-top:1px solid #30363d;margin:12px 0;}
.spin{width:12px;height:12px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;display:inline-block;animation:sp .6s linear infinite;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg);}}
.arr{display:flex;align-items:center;gap:6px;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:7px 9px;margin-bottom:5px;}
.arr input{background:#21262d;border:1px solid #30363d;flex:1;}
`;

// ─── IFRAME BUILDER HELPERS ───────────────────────────────────────────────────
function makeReactIframe(jsx, extraSetup = '') {
  return `<!DOCTYPE html><html><head><style>${IFRAME_CSS}<\/style><\/head><body>
<div id="root"><\/div>
<script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"><\/script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"><\/script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"><\/script>
<script src="${CORE_URL}"><\/script>
<script>
const { createForm } = agwForm;
function useForm(form) {
  const [s, set] = React.useState(() => form.getState());
  React.useEffect(() => form.subscribe(set), []);
  return s;
}
function useField(form, path) {
  const [val, setVal] = React.useState(() => form.get(path));
  const [fs, setFs] = React.useState({});
  React.useEffect(() => form.subscribeToPath(path, (v, f) => { setVal(v); setFs(f); }), [path]);
  return [val, fs, v => form.set(path, v, { touch: true, validate: true })];
}
${extraSetup}
<\/script>
<script type="text/babel" data-presets="react">
${jsx}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
<\/script>
<\/body><\/html>`;
}

function makeVueIframe(setup, template) {
  return `<!DOCTYPE html><html><head><style>${IFRAME_CSS}<\/style><\/head><body>
<div id="app"><\/div>
<script src="https://unpkg.com/vue@3.4.31/dist/vue.global.prod.js"><\/script>
<script src="${CORE_URL}"><\/script>
<script>
const { createForm } = agwForm;
const { createApp, ref, shallowRef, computed, onUnmounted, readonly } = Vue;
function useVueForm(form) {
  const state = shallowRef(form.getState());
  const unsub = form.subscribe(s => { state.value = Object.assign({}, s); });
  onUnmounted(unsub);
  return readonly(state);
}
function useVueField(form, path) {
  const value = ref(form.get(path));
  const error = ref(undefined);
  const touched = ref(false);
  const unsub = form.subscribeToPath(path, (v, fs) => { value.value = v; error.value = fs.error; touched.value = !!fs.touched; });
  onUnmounted(unsub);
  return { value, error, touched };
}
createApp({
  setup() { ${setup} },
  template: \`${template}\`
}).mount('#app');
<\/script><\/body><\/html>`;
}

// ─── PERF WRAPPER ────────────────────────────────────────────────────────────
// Augments a real engine form instance with lightweight perf tracking.
function withPerf(form) {
  let _n = 0, _ms = null, _epoch = 0, _batchDepth = 0;
  const _pathCounts = {};

  const origSub = form.subscribe.bind(form);
  const origPath = form.subscribeToPath.bind(form);
  const origValidate = form.validate.bind(form);
  const origBatch = form.batch.bind(form);

  form.subscribe = fn => {
    const wrapped = s => { _n++; fn(s); };
    return origSub(wrapped);
  };
  form.subscribeToPath = (path, fn) => {
    _pathCounts[path] = (_pathCounts[path] || 0) + 1;
    const wrapped = (v, fs) => { _n++; fn(v, fs); };
    const unsub = origPath(path, wrapped);
    return () => { _pathCounts[path] = Math.max(0, (_pathCounts[path] || 1) - 1); if (!_pathCounts[path]) delete _pathCounts[path]; unsub(); };
  };
  form.validate = paths => {
    const t = performance.now();
    _epoch++;
    return origValidate(paths).then(r => { _ms = performance.now() - t; return r; });
  };
  form.batch = fn => {
    _batchDepth++;
    try { origBatch(fn); } finally { _batchDepth--; }
  };

  form.perf = {
    get notifications() { return _n; },
    get lastValidationMs() { return _ms; },
    get epoch() { return _epoch; },
    get batchActive() { return _batchDepth > 0; },
    get subscriberCount() { return Object.values(_pathCounts).reduce((a, b) => a + b, 0); },
    get pathMap() { return Object.assign({}, _pathCounts); },
    reset() { _n = 0; _ms = null; },
  };
  return form;
}

// ─── SVELTE IN-BROWSER COMPILER ──────────────────────────────────────────────
// JSON-encode source so script-end-tags inside it can't close the srcdoc block.
// Rewrite svelte/* bare specifiers in the compiled output to absolute esm.sh URLs
// so dynamic blob-URL imports can resolve them (importmaps don't apply to blob URLs).
function makeSvelteIframe(svelteSource) {
  const jsonSrc = JSON.stringify(svelteSource).replace(/<\//g, '<\\/');
  return `<!DOCTYPE html><html>
<head>
<style>${IFRAME_CSS}<\/style>
<\/head><body>
<div id="root"><\/div>
<script type="module">
import { compile } from 'https://esm.sh/svelte@4.1.2/compiler';
await new Promise(res => { const s = document.createElement('script'); s.src='${CORE_URL}'; s.onload=res; document.head.appendChild(s); });
window.createForm = agwForm.createForm;
const src = ${jsonSrc};
try {
  const { js } = compile(src, { filename:'Demo.svelte', generate:'dom', format:'esm', dev:false });
  const code = js.code
    .replace(/import\\s*\\{[^}]+\\}\\s*from\\s*['"]svelte\\/internal\\/disclose-version['"]\\s*;?\\n?/g,
      function(m) { var n=m.match(/\\{[^}]+\\}/); return 'const '+(n?n[0]:'{}')+' = {disclose_version:function(){},PUBLIC_VERSION:"4"};\\n'; })
    .replace(/import\\s*['"]svelte\\/internal\\/disclose-version['"]\\s*;?\\n?/g, '')
    .replace(/from ['"]svelte(\\/[a-z_0-9/-]+)?['"]/g, function(m, sub) {
      return "from 'https://esm.sh/svelte@4.1.2" + (sub || '') + "'";
    });
  const blob = new Blob([code], { type:'text/javascript' });
  const { default: Component } = await import(URL.createObjectURL(blob));
  new Component({ target: document.getElementById('root') });
} catch(e) {
  document.getElementById('root').innerHTML = '<pre style="color:#f85149;font-size:11px;">' + e.message + '<\/pre>';
}
<\/script><\/body><\/html>`;
}

// ─── STACKBLITZ POST HELPER ───────────────────────────────────────────────────
function openStackBlitz(project) {
  const form = document.createElement('form');
  form.method = 'post';
  form.action = 'https://stackblitz.com/run';
  form.target = '_blank';
  form.style.display = 'none';
  const add = function(name, value) {
    const inp = document.createElement('input');
    inp.type = 'hidden'; inp.name = name; inp.value = value;
    form.appendChild(inp);
  };
  add('project[title]', project.title);
  add('project[description]', project.description || '');
  add('project[template]', project.template);
  Object.keys(project.files).forEach(function(path) { add('project[files][' + path + ']', project.files[path]); });
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}

function makeSolidIframe(code) {
  return `<!DOCTYPE html><html><head><style>${IFRAME_CSS}<\/style><\/head><body>
<div id="root"><\/div>
<script type="module">
import{createSignal,createEffect,onCleanup,For,Show,createMemo}from'https://esm.sh/solid-js@1.8.17';
import{render}from'https://esm.sh/solid-js@1.8.17/web';
import html from'https://esm.sh/solid-js@1.8.17/html';

// Load engine via dynamic import of the IIFE script
await new Promise(res => {
  const s = document.createElement('script');
  s.src = '${CORE_URL}';
  s.onload = res;
  document.head.appendChild(s);
});
const { createForm } = window.agwForm;

function useSolidForm(form) {
  const [s, set] = createSignal(form.getState(), { equals: false });
  const unsub = form.subscribe(v => set(Object.assign({}, v)));
  onCleanup(unsub);
  return s;
}
function useSolidField(form, path) {
  const [val, setVal] = createSignal(form.get(path));
  const [fs, setFs] = createSignal({});
  const unsub = form.subscribeToPath(path, (v, f) => { setVal(v); setFs(Object.assign({}, f)); });
  onCleanup(unsub);
  return [val, fs, v => form.set(path, v, { touch: true, validate: true })];
}
${code}
<\/script><\/body><\/html>`;
}

run(el) {
  const form = createForm({
    initialValues: {
      firstName:'', lastName:'', email:'',

    },

      firstName:'required', lastName:'required', email:['required','email'],

      </div>`;

    // Wire inputs
    const wireText = (id, path) => {

      if (!inp) return;
      inp.addEventListener('input', e => form.set(path, e.target.value, {touch:true, validate:true}));
    };
    const wireErr = (id, path) => {
      form.subscribeToPath(path, (_, fs) => {
        const el2 = document.getElementById('e-' + id);
        if (el2) el2.textContent = fs.touched && fs.error ? fs.error : '';
      });
    };

    if (currentStep === 0) {
      wireText('fn','firstName'); wireText('ln','lastName'); wireText('em','email');
      wireErr('fn','firstName'); wireErr('ln','lastName'); wireErr('em','email');

}

<script>

  import { onDestroy } from 'svelte';

  const { createForm } = window.agwForm;

  function useField(form, path) {
    const value   = writable(form.get(path));
    const error   = writable(undefined);
    const touched = writable(false);

// ─── APP STATE ────────────────────────────────────────────────────────────────

const FRAMEWORKS = [
  { key: 'vanilla', label: 'Vanilla JS', steps: VANILLA },
  { key: 'react',   label: 'React 18',   steps: REACT },
  { key: 'vue',     label: 'Vue 3',      steps: VUE },
  { key: 'solid',   label: 'SolidJS',    steps: SOLID },
  { key: 'svelte',  label: 'Svelte 4',   steps: SVELTE },
  { key: 'angular', label: 'Angular 16', steps: ANGULAR },
];

let currentFw = 'vanilla';
let currentIdx = 0;
let activeForm = null;
let perfInterval = null;

// ─── PERF PANEL ──────────────────────────────────────────────────────────────

function renderPerfPanel(form) {
  const pc = document.getElementById('perfContent');
  if (!form || !form.perf) { pc.innerHTML = ''; return; }
  const p = form.perf;
  const pathMap = p.pathMap || {};

  pc.innerHTML = `
    <div class="perf-row">
      <div class="perf-lbl">Notifications</div>
      <div class="perf-val" id="pn">${p.notifications}</div>
      <div class="perf-sub">total subscriber calls</div>
    </div>
    <div class="perf-row">
      <div class="perf-lbl">Last Validation</div>
      <div class="perf-val" id="pv">${p.lastValidationMs !== null ? p.lastValidationMs.toFixed(1) + 'ms' : '—'}</div>
      <div class="perf-sub">includes async debounce</div>
    </div>
    <div class="perf-row">
      <div class="perf-lbl">Async Epoch</div>
      <div class="perf-val" id="pe">${p.epoch}</div>
      <div class="perf-sub">increments per validation run</div>
    </div>
    <div class="perf-row">
      <div class="perf-lbl">Subscribers</div>
      <div class="perf-val" id="ps">${p.subscriberCount}</div>
      <div class="perf-sub">global + path listeners</div>
    </div>
    <div class="perf-row">
      <div class="perf-lbl">Batch Active</div>
      <div class="perf-val sm" id="pb" style="color:${p.batchActive ? 'var(--yellow)' : 'var(--green)'}">
        ${p.batchActive ? 'YES' : 'no'}
      </div>
    </div>
    <div style="padding:10px 12px;border-bottom:1px solid var(--border);">
      <div class="perf-lbl" style="margin-bottom:6px;">Path Subscribers</div>
      ${Object.keys(pathMap).length === 0 ? '<div style="font-size:11px;color:var(--t2);">(none yet)</div>' :
        Object.entries(pathMap).map(([path, count]) =>
          `<div class="perf-path-item"><span style="font-family:monospace;font-size:10px;color:var(--t1);">${path}</span><em>${count}</em></div>`
        ).join('')
      }
    </div>`;
}

function startPerfPolling(form) {
  stopPerfPolling();
  if (!form || !form.perf) return;
  perfInterval = setInterval(() => {
    const p = form.perf;
    const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    set('pn', p.notifications);
    set('pv', p.lastValidationMs !== null ? p.lastValidationMs.toFixed(1) + 'ms' : '—');
    set('pe', p.epoch);
    set('ps', p.subscriberCount);
    const pb = document.getElementById('pb');
    if (pb) {
      pb.textContent = p.batchActive ? 'YES' : 'no';
      pb.style.color = p.batchActive ? 'var(--yellow)' : 'var(--green)';
    }
  }, 150);
}

function stopPerfPolling() {
  if (perfInterval) { clearInterval(perfInterval); perfInterval = null; }
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────

function renderSidebar() {
  const fw = FRAMEWORKS.find(f => f.key === currentFw);
  const sb = document.getElementById('sidebar');
  sb.innerHTML = `<div class="sidebar-label">${fw.label}</div>` +
    fw.steps.map((step, i) =>
      `<div class="step-item ${i === currentIdx ? 'active' : ''}" data-idx="${i}">
        <span class="step-num">${i + 1}</span>
        <span>${step.title}</span>
       </div>`
    ).join('');
  sb.querySelectorAll('.step-item').forEach(el => {
    el.addEventListener('click', () => navigate(currentFw, parseInt(el.dataset.idx)));
  });
}

// ─── CODE PANEL ──────────────────────────────────────────────────────────────

function renderCode(step) {
  document.getElementById('stepTitle').textContent = step.title;
  document.getElementById('stepDesc').textContent = step.desc;
  const codeEl = document.getElementById('codeEl');
  codeEl.textContent = step.code;
  delete codeEl.dataset.highlighted;
  hljs.highlightElement(codeEl);
}

// ─── DEMO AREA ───────────────────────────────────────────────────────────────

function renderDemo(step) {
  // Clean up previous
  if (activeForm && activeForm.destroy) activeForm.destroy();
  const demoArea = document.getElementById('demoArea');
  if (demoArea._cleanup) { demoArea._cleanup(); demoArea._cleanup = null; }
  demoArea.innerHTML = '';
  stopPerfPolling();

  const isVanilla = currentFw === 'vanilla';
  const hasSb = step.stackblitzUrl;
  const isCliOnly = step.cliOnly;
  const hasSbProject = !!step.stackblitzProject;

  if (isVanilla && step.run) {
    // Vanilla — run the demo directly
    document.getElementById('demoLabel').textContent = 'Demo';
    const perfPanel = document.getElementById('perfPanel');
    perfPanel.style.display = 'flex';
    document.getElementById('workspace').style.gridTemplateColumns =
      'var(--side) 1fr 1fr var(--perf)';

    try {
      // Auto-wrap createForm with withPerf so every vanilla step populates
      // the Engine Internals panel without each step having to opt in.
      const rawCF = agwForm.createForm;
      createForm = (...a) => withPerf(rawCF(...a));
      activeForm = step.run(demoArea);
    } catch (err) {
      demoArea.innerHTML = `<div class="alert err">Error: ${err.message}</div>`;
    } finally {
      createForm = agwForm.createForm; // always restore
    }
    renderPerfPanel(activeForm);
    startPerfPolling(activeForm);
  } else if (step.iframeHtml) {
    // Framework — render in iframe
    document.getElementById('demoLabel').textContent = 'Live Demo';
    hidePerfPanel();

    const iframe = document.createElement('iframe');
    iframe.className = 'demo-iframe';
    iframe.style.flex = '1';
    iframe.srcdoc = step.iframeHtml;
    iframe.sandbox = 'allow-scripts allow-same-origin';
    demoArea.style.padding = '0';
    demoArea.style.display = 'flex';
    demoArea.style.flexDirection = 'column';
    demoArea.appendChild(iframe);
  } else if (hasSbProject) {
    // StackBlitz POST-based live demo
    document.getElementById('demoLabel').textContent = 'Run It';
    hidePerfPanel();
    demoArea.innerHTML = `
      <div style="max-width:380px;">
        <div class="alert info" style="font-size:13px;line-height:1.6;">
          This framework requires a build step. Click below to open a ready-to-run project in StackBlitz
          — all files are pre-configured, no setup needed.
        </div>
        <button id="sbLaunchBtn" class="sb-link" style="cursor:pointer;border:none;display:inline-block;margin-top:12px;">
          ↗ Open in StackBlitz
        </button>
      </div>`;
    document.getElementById('sbLaunchBtn').addEventListener('click', function() {
      openStackBlitz(step.stackblitzProject);
    });
  } else if (isCliOnly) {
    // Fallback — no live demo and no StackBlitz project defined
    document.getElementById('demoLabel').textContent = 'About';
    hidePerfPanel();
    demoArea.innerHTML = `
      <div style="max-width:420px;">
        <div class="alert info" style="font-size:13px;line-height:1.7;">
          This framework requires a compile step. The code on the left is correct and production-ready.
        </div>
      </div>`;
  } else if (hasSb) {
    // Code-only with StackBlitz link
    document.getElementById('demoLabel').textContent = 'Run It';
    hidePerfPanel();

    demoArea.innerHTML = `
      <div style="max-width:360px;">
        <div class="alert info" style="font-size:13px;line-height:1.6;">
          This framework requires a compile step. The code on the left is correct and production-ready.
          Open it in StackBlitz for a live, interactive demo.
        </div>
        <a class="sb-link" href="${step.stackblitzUrl}" target="_blank">
          ↗ Open in StackBlitz
        </a>
      </div>`;
  }
}

function hidePerfPanel() {
  const pp = document.getElementById('perfPanel');
  pp.style.display = 'none';
  document.getElementById('workspace').style.gridTemplateColumns = 'var(--side) 1fr 1fr';
}

// ─── FRAMEWORK TABS ──────────────────────────────────────────────────────────

function renderFwTabs() {
  const tabs = document.getElementById('fwTabs');
  tabs.innerHTML = FRAMEWORKS.map(fw =>
    `<button class="fw-tab ${fw.key === currentFw ? 'active' : ''}" data-fw="${fw.key}">
      ${fw.label}
     </button>`
  ).join('');
  tabs.querySelectorAll('.fw-tab').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.fw, 0));
  });
}

// ─── NAV FOOTER ──────────────────────────────────────────────────────────────

function renderNav() {
  const fw = FRAMEWORKS.find(f => f.key === currentFw);
  const total = fw.steps.length;
  document.getElementById('stepCtr').textContent = `${currentIdx + 1} / ${total}`;
  document.getElementById('prevBtn').disabled = currentIdx === 0;
  document.getElementById('nextBtn').disabled = currentIdx === total - 1;
}

// ─── ROUTER ──────────────────────────────────────────────────────────────────

function navigate(fw, idx) {
  currentFw = fw;
  currentIdx = idx;
  const step = FRAMEWORKS.find(f => f.key === fw).steps[idx];

  renderFwTabs();
  renderSidebar();
  renderCode(step);
  renderDemo(step);
  renderNav();

  const lang = (fw === 'svelte' || fw === 'angular') ? fw : 'javascript';
  document.getElementById('codeLang').textContent = lang;
}

// ─── EVENT BINDINGS ──────────────────────────────────────────────────────────

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentIdx > 0) navigate(currentFw, currentIdx - 1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  const fw = FRAMEWORKS.find(f => f.key === currentFw);
  if (currentIdx < fw.steps.length - 1) navigate(currentFw, currentIdx + 1);
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') document.getElementById('nextBtn').click();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   document.getElementById('prevBtn').click();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
navigate('vanilla', 0);
</script>
</body>
</html>
